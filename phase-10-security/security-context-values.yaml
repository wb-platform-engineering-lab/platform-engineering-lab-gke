# Helm values override — apply on top of phase-3-helm/charts/backend/values.yaml
# Usage:
#   helm upgrade coverline phase-3-helm/charts/backend/ \
#     -f phase-10-security/security-context-values.yaml
#
# IMPORTANT: requires the updated Docker image (non-root user, system-wide pip install).
# Build it by pushing a change to a feature branch to trigger CI, then update
# image.tag in values.yaml before running this upgrade.

# Disable Vault agent injection — no Vault server in phase 10
vault:
  enabled: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Writable directories the app actually needs
# (Flask temp files, gunicorn socket, etc.)
# Mount as emptyDir so the filesystem stays read-only everywhere else
extraVolumes:
  - name: tmp
    emptyDir: {}
  - name: app-cache
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: app-cache
    mountPath: /app/.cache
