replicaCount: 2
image:
  repository: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline/backend
  tag: "560383bd23685eec529b14cad6c74ba9d9944f75"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 5000
db:
  host: postgresql
  port: 5432
  name: coverline
  user: coverline
  password: coverline123
redis:
  host: redis-master
  port: 6379
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"
serviceMonitor:
  enabled: false
  namespace: monitoring
  additionalLabels:
    release: kube-prometheus-stack
  port: http
  path: /metrics
  interval: 15s
  scrapeTimeout: 10s
# Vault Agent secret injection
# Requires Phase 3 Vault deployed with vault-agent-injector running in the cluster.
# When enabled: DB credentials come from /vault/secrets/*.env — not from env vars above.
vault:
  enabled: false
  role: "coverline-backend"
  secrets:
    # Static config: DB_HOST, DB_NAME, REDIS_HOST → /vault/secrets/backend.env
    - name: backend.env
      path: secret/data/coverline/backend
      template: |
        {{- with secret "secret/data/coverline/backend" -}}
        export DB_HOST="{{ .Data.data.db_host }}"
        export DB_NAME="{{ .Data.data.db_name }}"
        export REDIS_HOST="{{ .Data.data.redis_host }}"
        {{- end }}
    # Dynamic credentials: DB_USERNAME, DB_PASSWORD → /vault/secrets/db.env (1h TTL)
    - name: db.env
      path: database/creds/coverline-backend
      template: |
        {{- with secret "database/creds/coverline-backend" -}}
        export DB_USER="{{ .Data.username }}"
        export DB_PASSWORD="{{ .Data.password }}"
        {{- end }}
