<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phase 5b Quiz — Progressive Delivery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc; color: #0f172a;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .progress-bar-wrap { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: #e2e8f0; z-index: 100; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #6366f1, #818cf8); transition: width 0.4s ease; }
    .header { position: fixed; top: 12px; right: 20px; font-size: 13px; color: #94a3b8; z-index: 100; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 48px; max-width: 680px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.06); animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .phase-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #6366f1; margin-bottom: 12px; }
    .question { font-size: 20px; font-weight: 600; line-height: 1.5; color: #0f172a; margin-bottom: 32px; }
    .question code { background: #f1f5f9; color: #4f46e5; padding: 2px 7px; border-radius: 5px; font-size: 15px; font-family: 'SF Mono', 'Fira Code', monospace; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s; user-select: none; }
    .option:hover:not(.disabled) { border-color: #6366f1; background: #eef2ff; transform: translateX(3px); }
    .option-key { width: 28px; height: 28px; min-width: 28px; border: 1.5px solid #cbd5e1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #64748b; transition: all 0.15s; }
    .option-text { font-size: 15px; line-height: 1.5; color: #334155; padding-top: 3px; }
    .option-text code { background: #f1f5f9; color: #4f46e5; padding: 1px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; }
    .option.correct { border-color: #22c55e; background: #f0fdf4; }
    .option.correct .option-key { background: #22c55e; border-color: #22c55e; color: #fff; }
    .option.correct .option-text { color: #166534; }
    .option.wrong { border-color: #ef4444; background: #fef2f2; }
    .option.wrong .option-key { background: #ef4444; border-color: #ef4444; color: #fff; }
    .option.wrong .option-text { color: #991b1b; }
    .option.dimmed { opacity: 0.35; }
    .option.disabled { cursor: default; }
    .explanation { margin-top: 20px; padding: 16px 18px; background: #f8fafc; border-left: 3px solid #6366f1; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.65; color: #475569; animation: fadeUp 0.25s ease; }
    .explanation code { background: #f1f5f9; color: #4f46e5; padding: 1px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; }
    .btn-next { margin-top: 28px; padding: 14px 32px; background: #6366f1; color: #fff; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: background 0.15s, transform 0.1s; width: 100%; }
    .btn-next:hover { background: #4f46e5; transform: translateY(-1px); }
    .score-screen { text-align: center; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #818cf8); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .score-number { font-size: 36px; font-weight: 800; color: #fff; line-height: 1; }
    .score-total { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .score-title { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
    .score-subtitle { font-size: 15px; color: #64748b; margin-bottom: 32px; line-height: 1.6; }
    .score-breakdown { display: flex; gap: 12px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
    .score-tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .score-tag.correct { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .score-tag.wrong   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-restart { padding: 14px 40px; background: transparent; color: #6366f1; font-size: 15px; font-weight: 600; border: 1.5px solid #6366f1; border-radius: 10px; cursor: pointer; transition: background 0.15s; margin-right: 12px; }
    .btn-restart:hover { background: #eef2ff; }
    .btn-back { padding: 14px 40px; background: #6366f1; color: #fff; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
    .btn-back:hover { background: #4f46e5; }
  </style>
</head>
<body>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="header" id="questionCounter"></div>
<div class="card" id="quizCard"></div>
<script>
const questions = [
  {
    q: "CoverLine shipped a new release and 18 minutes passed before anyone noticed a 12% error spike. What does progressive delivery solve that GitOps alone does not?",
    options: [
      "It prevents bad code from being merged to the main branch",
      "It shifts traffic gradually and gates promotion on live metrics — catching regressions before 100% of users are affected",
      "It runs integration tests in the cluster before applying the Helm chart",
      "It rolls back the Git commit automatically when Prometheus detects errors"
    ],
    correct: 1,
    explanation: "GitOps ensures the cluster matches Git — but it says nothing about whether the new version is healthy. Progressive delivery shifts traffic incrementally (10% → 30% → 100%) and queries real production metrics at each step. A regression that affects 10% of traffic triggers an automatic rollback before the other 90% are ever exposed."
  },
  {
    q: "You apply <code>rollout.yaml</code> but the rollout stays at 0% canary weight for several minutes. What is the most likely cause?",
    options: [
      "The Argo Rollouts controller is not installed in the cluster",
      "The Rollout requires at least 5 replicas to start a canary",
      "The AnalysisTemplate is missing — Argo Rollouts cannot proceed without one",
      "The old Deployment still exists and is conflicting with the Rollout"
    ],
    correct: 3,
    explanation: "A Deployment and a Rollout managing the same pod selector will fight over ReplicaSets. The Rollout cannot advance because the Deployment keeps reconciling to its own desired state. Fix: <code>kubectl delete deployment coverline-backend</code> before applying the Rollout."
  },
  {
    q: "What does <code>failureLimit: 0</code> mean in an AnalysisTemplate?",
    options: [
      "The analysis is skipped if zero requests have been made",
      "Any single failed measurement immediately fails the analysis and triggers rollback",
      "The rollout is aborted only after 0 successful measurements",
      "The metric must return exactly 0 to be considered healthy"
    ],
    correct: 1,
    explanation: "<code>failureLimit: 0</code> means zero tolerance — the first measurement that fails the <code>failureCondition</code> immediately marks the AnalysisRun as Failed, which triggers Argo Rollouts to abort the canary and restore 100% traffic to the stable version."
  },
  {
    q: "The AnalysisTemplate cannot reach Prometheus and the rollout is stuck. How do you debug this?",
    options: [
      "Run <code>kubectl rollout restart</code> on the argo-rollouts deployment",
      "<code>kubectl describe analysisrun &lt;name&gt;</code> — look for the Prometheus connection error in the events",
      "Check <code>kubectl get hpa</code> — HPA conflicts with AnalysisTemplates",
      "Delete the AnalysisTemplate and re-apply it"
    ],
    correct: 1,
    explanation: "<code>kubectl describe analysisrun</code> shows the exact error from the Prometheus provider — typically an unreachable URL or a connection refused. The most common fix is correcting the Prometheus address in the AnalysisTemplate to match the in-cluster service: <code>http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090</code>"
  },
  {
    q: "What is the difference between <code>count: 3</code> and <code>interval: 30s</code> in an AnalysisTemplate metric?",
    options: [
      "<code>count</code> is the number of pods to sample; <code>interval</code> is how long to wait between pod restarts",
      "<code>count</code> is how many measurements to take total; <code>interval</code> is how often to query — so 3 measurements at 30s each = 90s of analysis",
      "<code>count</code> sets the failure threshold; <code>interval</code> sets the success threshold",
      "They are aliases — only one needs to be set"
    ],
    correct: 1,
    explanation: "With <code>count: 3</code> and <code>interval: 30s</code>, Argo Rollouts queries Prometheus 3 times, 30 seconds apart, before declaring the analysis complete. All 3 must pass (given <code>failureLimit: 0</code>). This means the canary must sustain a healthy success rate for 90 seconds before traffic advances."
  },
  {
    q: "After a bad deploy is rolled back automatically, the image tag in Git still points to the broken version. What is the correct next step?",
    options: [
      "Nothing — Argo Rollouts updated Git automatically during rollback",
      "Run <code>kubectl argo rollouts undo coverline-backend</code> to sync Git",
      "Update the image tag in Git to the last known-good version and push — let ArgoCD re-sync",
      "Delete the Rollout and re-apply the previous rollout.yaml manually"
    ],
    correct: 2,
    explanation: "Argo Rollouts manages the in-cluster state but does not modify Git. After a rollback, the GitOps source of truth (Git) still shows the broken tag. The correct fix is to push a new commit with the stable image tag — ArgoCD then syncs the cluster back to the healthy state, keeping Git as the single source of truth."
  },
  {
    q: "How does Argo Rollouts achieve instant rollback when a canary fails?",
    options: [
      "It re-deploys the stable pods from scratch, which takes 3–4 minutes",
      "It keeps the stable ReplicaSet running throughout the canary — rollback is just a traffic weight change, no pod recreation needed",
      "It uses a database snapshot to restore the application state",
      "It scales the canary pods to 0 and scales up the previous Deployment"
    ],
    correct: 1,
    explanation: "During a canary rollout, Argo Rollouts maintains both the stable ReplicaSet (old version) and the canary ReplicaSet (new version) simultaneously. Rollback is instantaneous — it sets the canary weight to 0% and the stable weight to 100%. No pods need to be created. <code>scaleDownDelaySeconds</code> controls how long the canary ReplicaSet is kept after rollback before being cleaned up."
  },
  {
    q: "You want to add p99 latency as a second promotion gate alongside the success rate check. Where do you add it?",
    options: [
      "In the Rollout spec under <code>strategy.canary.steps</code>",
      "As a second entry in the <code>metrics</code> array of the existing AnalysisTemplate",
      "As a separate AnalysisTemplate referenced in the HPA",
      "In the Prometheus alerting rules — Argo Rollouts reads PrometheusRule objects automatically"
    ],
    correct: 1,
    explanation: "An AnalysisTemplate can contain multiple metrics in its <code>metrics[]</code> array. Each metric runs independently — all must pass for the analysis to succeed. Adding a p99 latency metric alongside the success rate means both checks must be green before traffic advances."
  },
  {
    q: "What is <code>progressDeadlineSeconds</code> on a Rollout and why is it important in production?",
    options: [
      "It sets how long each canary step pauses before advancing",
      "It caps the total time the rollout can run — if not complete within the deadline, the rollout is aborted automatically",
      "It defines the maximum time Prometheus is allowed to respond to an analysis query",
      "It controls how long Kubernetes waits before marking a pod as NotReady"
    ],
    correct: 1,
    explanation: "Without a deadline, a stalled rollout (e.g., an AnalysisRun waiting indefinitely for Prometheus data) leaves traffic split at the canary weight indefinitely. <code>progressDeadlineSeconds</code> (e.g., 600 = 10 minutes) ensures the rollout is automatically aborted if it takes too long, restoring stable traffic and alerting the team."
  },
  {
    q: "How does ArgoCD know to display canary progress and analysis status in its UI?",
    options: [
      "You must install a separate ArgoCD plugin from the marketplace",
      "ArgoCD automatically detects Rollout resources when the Argo Rollouts controller is installed — no additional config needed",
      "You must add a <code>rollout: true</code> annotation to the ArgoCD Application manifest",
      "ArgoCD only shows Rollout status if you use the argocd CLI, not the web UI"
    ],
    correct: 1,
    explanation: "ArgoCD has native awareness of Argo Rollouts. When the Rollouts controller CRDs are present, ArgoCD's health assessment and UI automatically recognise Rollout resources and display canary weight, step progress, and AnalysisRun status alongside the standard sync state — no extra configuration required."
  }
];

const LABEL = "Phase 5b — Progressive Delivery";
const NEXT_PHASE = "../phase-6-observability/quiz.html";

let current = 0, score = 0, answered = false;

function render() {
  const q = questions[current];
  const keys = ["A","B","C","D"];
  document.getElementById("progressBar").style.width = ((current / questions.length) * 100) + "%";
  document.getElementById("questionCounter").textContent = (current + 1) + " / " + questions.length;
  document.getElementById("quizCard").innerHTML =
    '<div class="phase-label">' + LABEL + '</div>' +
    '<div class="question">' + q.q + '</div>' +
    '<div class="options" id="options">' +
    q.options.map(function(opt, i) {
      return '<div class="option" onclick="select(' + i + ')">' +
        '<div class="option-key">' + keys[i] + '</div>' +
        '<div class="option-text">' + opt + '</div></div>';
    }).join('') + '</div>';
  answered = false;
}

function select(i) {
  if (answered) return;
  answered = true;
  var q = questions[current];
  var opts = document.querySelectorAll(".option");
  opts.forEach(function(el) { el.classList.add("disabled"); });
  if (i === q.correct) { opts[i].classList.add("correct"); score++; }
  else { opts[i].classList.add("wrong"); opts[q.correct].classList.add("correct"); }
  opts.forEach(function(el, idx) { if (idx !== i && idx !== q.correct) el.classList.add("dimmed"); });
  var exp = document.createElement("div");
  exp.className = "explanation";
  exp.innerHTML = q.explanation;
  document.getElementById("options").after(exp);
  var btn = document.createElement("button");
  btn.className = "btn-next";
  btn.textContent = current < questions.length - 1 ? "Next question →" : "See results";
  btn.onclick = function() { current++; if (current < questions.length) render(); else renderScore(); };
  exp.after(btn);
}

function renderScore() {
  var pct = Math.round((score / questions.length) * 100);
  var msg = pct === 100 ? "Perfect — you understand progressive delivery end to end." :
            pct >= 70  ? "Solid. Review the AnalysisTemplate and rollback mechanics." :
                         "Argo Rollouts has some subtleties — re-read the README and retry.";
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("questionCounter").textContent = "";
  var breakdown = questions.map(function(q, i) {
    return '<span class="score-tag ' + (i < score ? 'correct' : 'wrong') + '">' + (i + 1) + '</span>';
  }).join('');
  document.getElementById("quizCard").innerHTML =
    '<div class="score-screen">' +
    '<div class="score-circle"><div class="score-number">' + score + '</div><div class="score-total">/ ' + questions.length + '</div></div>' +
    '<div class="score-title">' + pct + '% — ' + (pct >= 70 ? 'Nice work' : 'Keep going') + '</div>' +
    '<div class="score-subtitle">' + msg + '</div>' +
    '<div class="score-breakdown">' + breakdown + '</div>' +
    '<button class="btn-restart" onclick="restart()">Retry</button>' +
    '<a class="btn-back" href="' + NEXT_PHASE + '">Phase 6 →</a>' +
    '</div>';
}

function restart() { current = 0; score = 0; render(); }
render();
</script>
</body>
</html>
