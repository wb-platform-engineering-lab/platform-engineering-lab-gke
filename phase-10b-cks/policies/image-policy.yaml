# Sigstore Policy Controller — ClusterImagePolicy
# Requires a valid Cosign signature from the CoverLine CI key on every image
# pulled from the CoverLine Artifact Registry. Unsigned images are rejected
# at admission before the pod is scheduled.
#
# Prerequisites:
#   helm upgrade --install policy-controller sigstore/policy-controller \
#     --namespace cosign-system --create-namespace --wait
#
# Replace <PROJECT_ID> with your GCP project ID.
# Replace cosign.pub content with your actual public key.
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: coverline-signed-images
spec:
  images:
    - glob: "us-central1-docker.pkg.dev/platform-eng-lab-will/coverline/**"
  authorities:
    - key:
        # cosign.pub — generated by: cosign generate-key-pair
        # Commit cosign.pub to the repo; store cosign.key in GitHub Actions secrets.
        data: |
          -----BEGIN PUBLIC KEY-----
          # REPLACE WITH YOUR cosign.pub CONTENT
          # Run: cat cosign.pub
          -----END PUBLIC KEY-----
