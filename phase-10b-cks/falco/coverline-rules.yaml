# Falco custom rules — Phase 10b CKS
#
# Deploy:
#   kubectl create configmap falco-coverline-rules \
#     --from-file=phase-10b-cks/falco/coverline-rules.yaml \
#     --namespace falco

# Scenario 4 exam answer — shadow file read outside kube-system
- rule: Shadow file read outside kube-system
  desc: A process read /etc/shadow in a non-system container
  condition: >
    open_read and fd.name = "/etc/shadow" and
    not k8s.ns.name in (kube-system, kube-public)
  output: >
    Sensitive file read: /etc/shadow
    (proc=%proc.name container=%container.name user=%user.name)
  priority: WARNING
  tags: [shadow-file, credential-access]

# Custom CoverLine rule — non-Python process reads DB_PASSWORD from /proc environ
- rule: Suspicious DB credential access
  desc: >
    A non-Python process read the environ of another process — a technique
    used to scrape DB_PASSWORD, JWT_SECRET, or other env-var credentials
    from a running container.
  condition: >
    open_read and
    container and
    k8s.ns.name = "coverline" and
    fd.name glob "/proc/*/environ" and
    not proc.name in (python3, gunicorn, python)
  output: >
    Suspicious environ read in CoverLine container
    (proc=%proc.name container=%container.name
     user=%user.name file=%fd.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [coverline, credential-access]
