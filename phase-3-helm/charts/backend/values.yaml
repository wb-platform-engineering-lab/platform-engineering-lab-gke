replicaCount: 2

image:
  repository: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline/backend
  tag: "bdb0d94a66ef9bd57e2fe5de6754eb065b53ca46"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

db:
  port: 5432

redis:
  port: 6379

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

# Vault Agent secret injection
vault:
  enabled: true
  role: "coverline-backend"
  secrets:
    # Static config: DB_HOST, DB_NAME, REDIS_HOST → /vault/secrets/backend.env
    - name: backend.env
      path: secret/data/coverline/backend
      template: |
        {{- with secret "secret/data/coverline/backend" -}}
        export DB_HOST="{{ .Data.data.db_host }}"
        export DB_NAME="{{ .Data.data.db_name }}"
        export REDIS_HOST="{{ .Data.data.redis_host }}"
        {{- end }}
    # Dynamic credentials: DB_DYNAMIC_USERNAME, DB_DYNAMIC_PASSWORD → /vault/secrets/db.env
    - name: db.env
      path: database/creds/coverline-backend
      template: |
        {{- with secret "database/creds/coverline-backend" -}}
        export DB_DYNAMIC_USERNAME="{{ .Data.username }}"
        export DB_DYNAMIC_PASSWORD="{{ .Data.password }}"
        {{- end }}
