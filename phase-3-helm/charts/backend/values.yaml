replicaCount: 3

image:
  repository: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline/backend
  tag: "v2"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

db:
  host: postgresql
  port: 5432
  name: coverline
  user: coverline

redis:
  host: redis-master
  port: 6379

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"
