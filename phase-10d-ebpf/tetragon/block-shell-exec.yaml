# Tetragon TracingPolicyNamespaced — block shell execution in the coverline namespace
#
# When any process in a coverline pod attempts to execve a shell binary,
# Tetragon intercepts the syscall in-kernel and sends SIGKILL before
# the exec completes. The process never starts. No shell, no REPL.
#
# This is enforcement, not detection. Falco handles alerting.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: block-shell-exec
  namespace: coverline
spec:
  kprobes:
    - call: "security_bprm_check"
      syscall: false
      return: false
      args:
        - index: 0
          type: "linux_binprm"
      selectors:
        - matchBinaries:
            operator: "In"
            values:
              - "/bin/sh"
              - "/bin/bash"
              - "/usr/bin/bash"
              - "/usr/bin/sh"
              - "/bin/dash"
              - "/bin/zsh"
              - "/usr/bin/zsh"
          matchActions:
            - action: Sigkill
              argError: -1
