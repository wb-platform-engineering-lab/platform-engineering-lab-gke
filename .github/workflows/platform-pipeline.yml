name: Platform Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "phase-3-helm/app/**"
      - ".github/workflows/platform-pipeline.yml"
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Image SHA to promote (e.g. abc1234)"
        required: true
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stag
          - prod

env:
  REGISTRY: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline
  PROJECT: platform-eng-lab-will
  REGION: us-central1

jobs:
  # ── CI: runs on every push ────────────────────────────────────────────────
  ci:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_sha: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/253419630104/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@platform-eng-lab-will.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set image SHA output
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/backend:${{ steps.meta.outputs.sha }} \
            phase-3-helm/app/backend/

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan backend image for CVEs
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            ${{ env.REGISTRY }}/backend:${{ steps.meta.outputs.sha }}

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/frontend:${{ steps.meta.outputs.sha }} \
            phase-3-helm/app/frontend/

      - name: Scan frontend image for CVEs
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            ${{ env.REGISTRY }}/frontend:${{ steps.meta.outputs.sha }}

      - name: Push images (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.REGISTRY }}/backend:${{ steps.meta.outputs.sha }}
          docker push ${{ env.REGISTRY }}/frontend:${{ steps.meta.outputs.sha }}

  # ── CD: auto-deploys to dev on every merge to main ───────────────────────
  deploy-dev:
    name: Deploy to dev
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update dev image tag
        run: |
          SHA=${{ needs.ci.outputs.image_sha }}
          for chart in backend frontend; do
            yq eval ".image.tag = \"${SHA}\"" -i \
              "phase-3-helm/charts/${chart}/values-dev.yaml"
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add phase-3-helm/charts/*/values-dev.yaml
          git diff --cached --quiet || \
            git commit -m "chore(dev): deploy image ${{ needs.ci.outputs.image_sha }}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done

  # ── Manual promotion: stag or prod ───────────────────────────────────────
  promote:
    name: Promote to ${{ github.event.inputs.target_env }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.target_env }}
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update ${{ github.event.inputs.target_env }} image tag
        run: |
          SHA=${{ github.event.inputs.image_sha }}
          ENV=${{ github.event.inputs.target_env }}
          for chart in backend frontend; do
            yq eval ".image.tag = \"${SHA}\"" -i \
              "phase-3-helm/charts/${chart}/values-${ENV}.yaml"
          done

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ENV=${{ github.event.inputs.target_env }}
          git add phase-3-helm/charts/*/values-${ENV}.yaml
          git diff --cached --quiet || \
            git commit -m "chore(${ENV}): promote image ${{ github.event.inputs.image_sha }}"
          git pull --rebase origin main
          git push
