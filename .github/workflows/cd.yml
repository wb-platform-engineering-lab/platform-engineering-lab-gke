name: CD — Build, Push & Update Image Tags

on:
  push:
    branches:
      - main
    paths:
      - "phase-3-helm/app/**"
      - ".github/workflows/cd.yml"

env:
  PROJECT_ID: platform-eng-lab-will
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline
  VAULT_ADDR: http://vault.vault.svc.cluster.local:8200

jobs:
  deploy:
    name: Build, Push & Update values.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the values.yaml update
      id-token: write   # needed for GCP Workload Identity + Vault JWT auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/253419630104/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@platform-eng-lab-will.iam.gserviceaccount.com

      # Phase 7 only — retrieve secrets from Vault via JWT auth (no static secrets in CI).
      # Skip this step when Vault is not running (phases 8, 10).
      - name: Authenticate to Vault and retrieve secrets
        if: ${{ vars.VAULT_ENABLED == 'true' }}
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          path: jwt/github
          role: github-ci
          # Secrets exposed as masked env vars — never logged or stored in CI
          secrets: |
            secret/data/coverline/backend db_host | DB_HOST ;
            secret/data/coverline/backend db_name | DB_NAME

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: phase-3-helm/app/backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: phase-3-helm/app/frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest

      - name: Update image tags in values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" \
            phase-3-helm/charts/backend/values.yaml
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" \
            phase-3-helm/charts/frontend/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add phase-3-helm/charts/backend/values.yaml \
                  phase-3-helm/charts/frontend/values.yaml
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push

      - name: Summary
        run: |
          echo "## CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend image:** \`${{ env.REGISTRY }}/backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend image:** \`${{ env.REGISTRY }}/frontend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **values.yaml updated** — ArgoCD will sync automatically" >> $GITHUB_STEP_SUMMARY
          echo "- **Vault secrets** retrieved via JWT auth (no static secrets in CI)" >> $GITHUB_STEP_SUMMARY
