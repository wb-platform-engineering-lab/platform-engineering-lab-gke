name: CD — Deploy to GKE

on:
  push:
    branches:
      - main
    paths:
      - "phase-3-helm/app/**"

env:
  PROJECT_ID: platform-eng-lab-will
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline
  CLUSTER: platform-eng-lab-will-gke

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/253419630104/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@platform-eng-lab-will.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: phase-3-helm/app/backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: phase-3-helm/app/frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials ${{ env.CLUSTER }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }}

      - name: Grant CI SA GKE access
        run: |
          gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
            --member="serviceAccount:github-ci@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --role="roles/container.developer" --quiet 2>/dev/null || true

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Deploy backend
        run: |
          helm upgrade --install coverline phase-3-helm/charts/backend/ \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Deploy frontend
        run: |
          helm upgrade --install coverline-frontend phase-3-helm/charts/frontend/ \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Summary
        run: |
          echo "## CD Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** \`${{ env.REGISTRY }}/backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** \`${{ env.REGISTRY }}/frontend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
