extends: default

rules:
  # Kubernetes and Helm YAML can be verbose
  line-length:
    max: 150
  # Allow on/off in addition to true/false (GitHub Actions uses `on:` as trigger key)
  truthy:
    allowed-values: ["true", "false", "on", "off"]
  # Allow multiple documents in one file (---  separator)
  document-start: disable
