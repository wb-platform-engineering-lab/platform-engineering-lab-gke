apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: coverline-backend
  namespace: default
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: coverline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/platform-eng-lab-will/coverline/backend:latest
          env:
            - name: DB_PORT
              value: "5432"
            - name: REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

  strategy:
    canary:
      # Canary steps: 10% → analysis → 30% → analysis → 100%
      steps:
        - setWeight: 10
        - pause: {duration: 2m}
        - analysis:
            templates:
              - templateName: coverline-success-rate
        - setWeight: 30
        - pause: {duration: 2m}
        - analysis:
            templates:
              - templateName: coverline-success-rate

      # Anti-affinity: spread canary and stable pods across nodes
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 1
