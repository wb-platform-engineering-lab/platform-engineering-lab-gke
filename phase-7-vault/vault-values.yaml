server:
  # GCP SA JSON key mounted for KMS auto-unseal
  # Note: GKE WI metadata proxy does not support ?scopes= parameter used by Vault's gcpckms plugin
  extraEnvironmentVars:
    GOOGLE_APPLICATION_CREDENTIALS: /vault/userconfig/vault-kms-credentials/credentials.json

  # HA mode with Raft integrated storage — 3 nodes, no external storage dependency
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        # Auto-unseal using GCP KMS — no manual unseal key required
        seal "gcpckms" {
          project    = "platform-eng-lab-will"
          region     = "global"
          key_ring   = "vault-keyring"
          crypto_key = "vault-unseal-key"
        }

        service_registration "kubernetes" {}

        # Prometheus metrics — scraped by kube-prometheus-stack
        telemetry {
          prometheus_retention_time      = "30s"
          disable_hostname               = true
          unauthenticated_metrics_access = true
        }

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  persistence:
    enabled: true
    size: 1Gi

  # Audit log volume — mounted at /vault/logs
  extraVolumes:
    - type: secret
      name: vault-kms-credentials
      mountPath: /vault/userconfig/vault-kms-credentials
    - type: emptyDir
      name: audit-logs
      mountPath: /vault/logs

injector:
  enabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 250m

ui:
  enabled: true
  serviceType: ClusterIP

# Prometheus ServiceMonitor — picked up by kube-prometheus-stack
serverTelemetry:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    selectors:
      release: kube-prometheus-stack
