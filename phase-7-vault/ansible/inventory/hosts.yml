# hosts.yml — Ansible inventory for the Vault VM.
# Populate vault_ip from Terraform output:
#   export VAULT_IP=$(terraform -chdir=phase-7-vault/terraform output -raw vault_internal_ip)

all:
  hosts:
    vault-server:
      # Replace with output from: terraform -chdir=phase-7-vault/terraform output -raw vault_internal_ip
      ansible_host: "{{ lookup('env', 'VAULT_IP') }}"
      ansible_user: "{{ lookup('env', 'USER') }}"
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ProxyCommand='gcloud compute start-iap-tunnel vault-server 22 --listen-on-stdin --zone=us-central1-b --project=platform-eng-lab-will'"
  vars:
    vault_version: "1.17.2"
    vault_install_dir: "/usr/local/bin"
    vault_config_dir: "/etc/vault.d"
    vault_data_dir: "/opt/vault/data"
    vault_log_dir: "/var/log/vault"
    gcp_project: "platform-eng-lab-will"
    kms_key_ring: "vault-keyring"
    kms_key_name: "vault-unseal-key"
    kms_region: "global"
