# vault-agent-patch.yaml
# Patch the coverline-backend Deployment to inject secrets via Vault Agent sidecar.
# Apply with: kubectl patch deployment coverline-backend --patch-file vault-agent-patch.yaml

spec:
  template:
    metadata:
      annotations:
        # Enable Vault Agent injection
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "coverline-backend"

        # Inject secret at /vault/secrets/backend.env
        vault.hashicorp.com/agent-inject-secret-backend.env: "secret/data/coverline/backend"

        # Render secret as shell-sourceable env file
        vault.hashicorp.com/agent-inject-template-backend.env: |
          {{- with secret "secret/data/coverline/backend" -}}
          export DB_PASSWORD="{{ .Data.data.db_password }}"
          export DB_USERNAME="{{ .Data.data.db_username }}"
          export DB_HOST="{{ .Data.data.db_host }}"
          export DB_NAME="{{ .Data.data.db_name }}"
          export REDIS_HOST="{{ .Data.data.redis_host }}"
          {{- end }}

        # Keep secrets up to date (re-render when secret changes)
        vault.hashicorp.com/agent-inject-command-backend.env: "kill -HUP $(pidof python3) 2>/dev/null || true"

    spec:
      serviceAccountName: coverline-backend
