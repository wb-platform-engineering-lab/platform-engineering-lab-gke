# vault-tls.yaml
# TLS certificate for Vault using cert-manager with a self-signed ClusterIssuer.
#
# Prerequisites:
#   - cert-manager installed (bootstrap.sh --phase 7 handles this)
#
# Apply with: kubectl apply -f phase-3-vault/vault-tls.yaml
# Then: helm upgrade vault hashicorp/vault -n vault -f phase-3-vault/vault-values.yaml -f phase-3-vault/vault-tls-values.yaml

---
# Self-signed ClusterIssuer — signs Vault's certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-selfsigned
spec:
  selfSigned: {}

---
# CA certificate — used to sign the Vault server cert
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-ca
  namespace: vault
spec:
  isCA: true
  commonName: vault-ca
  secretName: vault-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: vault-selfsigned
    kind: ClusterIssuer

---
# CA-backed Issuer — signs Vault server certs
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: vault-ca-issuer
  namespace: vault
spec:
  ca:
    secretName: vault-ca-secret

---
# Vault server certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: vault
spec:
  secretName: vault-server-tls
  duration: 8760h    # 1 year
  renewBefore: 720h  # renew 30 days before expiry
  subject:
    organizations:
      - coverline
  commonName: vault.vault.svc.cluster.local
  dnsNames:
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - vault-0.vault-internal
    - vault-1.vault-internal
    - vault-2.vault-internal
  issuerRef:
    name: vault-ca-issuer
    kind: Issuer
