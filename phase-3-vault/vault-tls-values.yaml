# vault-tls-values.yaml
# Helm values override to enable TLS on Vault.
# Apply on top of vault-values.yaml:
#   helm upgrade vault hashicorp/vault -n vault \
#     -f phase-3-vault/vault-values.yaml \
#     -f phase-3-vault/vault-tls-values.yaml
#
# After applying, update VAULT_ADDR to https://localhost:8200 and set VAULT_CACERT.

server:
  ha:
    raft:
      config: |
        ui = true

        listener "tcp" {
          tls_disable     = 0
          address         = "[::]:8200"
          cluster_address = "[::]:8201"

          tls_cert_file = "/vault/userconfig/vault-server-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-server-tls/tls.key"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr     = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-server-tls/ca.crt"
          }
          retry_join {
            leader_api_addr     = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-server-tls/ca.crt"
          }
          retry_join {
            leader_api_addr     = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-server-tls/ca.crt"
          }
        }

        seal "gcpckms" {
          project    = "platform-eng-lab-will"
          region     = "global"
          key_ring   = "vault-keyring"
          crypto_key = "vault-unseal-key"
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time      = "30s"
          disable_hostname               = true
          unauthenticated_metrics_access = true
        }

  extraVolumes:
    - type: secret
      name: vault-kms-credentials
      mountPath: /vault/userconfig/vault-kms-credentials
    - type: emptyDir
      name: audit-logs
      mountPath: /vault/logs
    - type: secret
      name: vault-server-tls
      mountPath: /vault/userconfig/vault-server-tls
