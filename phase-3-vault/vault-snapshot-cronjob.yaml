# vault-snapshot-cronjob.yaml
# Daily Raft snapshot uploaded to GCS for disaster recovery.
#
# Prerequisites:
#   - vault-policy.sh has been run (creates vault-snapshot policy + K8s role)
#   - GCS bucket exists: gs://platform-eng-lab-will-vault-snapshots
#   - vault-snapshot K8s SA has Workload Identity binding to a GCP SA with storage.objectAdmin
#
# Apply with: kubectl apply -f phase-3-vault/vault-snapshot-cronjob.yaml

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-snapshot
  namespace: vault
spec:
  schedule: "0 2 * * *"     # daily at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            # Vault Agent authenticates using the vault-snapshot K8s SA
            vault.hashicorp.com/agent-inject: "false"  # no secret injection needed — we use vault CLI directly
        spec:
          serviceAccountName: vault-snapshot
          restartPolicy: OnFailure
          containers:
            - name: snapshot
              image: hashicorp/vault:1.15.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
                  export VAULT_ADDR

                  # Authenticate via Kubernetes auth
                  JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                    role=vault-snapshot \
                    jwt="$JWT")
                  export VAULT_TOKEN

                  # Take snapshot
                  SNAPSHOT_FILE="/tmp/vault-$(date +%Y%m%d-%H%M%S).snap"
                  vault operator raft snapshot save "$SNAPSHOT_FILE"
                  echo "Snapshot saved: $SNAPSHOT_FILE ($(du -sh $SNAPSHOT_FILE | cut -f1))"

                  # Upload to GCS
                  GCS_PATH="gs://platform-eng-lab-will-vault-snapshots/$(basename $SNAPSHOT_FILE)"
                  gsutil cp "$SNAPSHOT_FILE" "$GCS_PATH"
                  echo "Uploaded to: $GCS_PATH"

                  # Keep only last 30 snapshots
                  gsutil ls gs://platform-eng-lab-will-vault-snapshots/ \
                    | sort \
                    | head -n -30 \
                    | xargs -r gsutil rm
                  echo "Old snapshots pruned (keeping last 30)."
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
                limits:
                  memory: 128Mi
                  cpu: 100m
