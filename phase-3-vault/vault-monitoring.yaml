# vault-monitoring.yaml
# Prometheus alerting rules and Grafana dashboard for Vault.
# Apply with: kubectl apply -f phase-3-vault/vault-monitoring.yaml
# Prerequisites: kube-prometheus-stack installed in namespace monitoring

---
# Alerting rules
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vault-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack  # picked up by kube-prometheus-stack
spec:
  groups:
    - name: vault
      interval: 30s
      rules:

        # Vault node is sealed — secrets unavailable on that node
        - alert: VaultSealed
          expr: vault_core_unsealed == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Vault node is sealed"
            description: "Vault node {{ $labels.pod }} has been sealed for more than 1 minute. Secrets are unavailable on this node."

        # Vault is down entirely (no metrics received)
        - alert: VaultDown
          expr: absent(vault_core_unsealed)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Vault is unreachable"
            description: "No metrics received from Vault for 2 minutes. The cluster may be down."

        # High request error rate
        - alert: VaultHighErrorRate
          expr: |
            sum(rate(vault_core_handle_request_count{status="error"}[5m])) /
            sum(rate(vault_core_handle_request_count[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Vault error rate above 5%"
            description: "More than 5% of Vault requests are failing over the last 5 minutes."

        # Too many active leases — could indicate a leak
        - alert: VaultLeaseCountHigh
          expr: vault_expire_num_leases > 10000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Vault lease count is high"
            description: "Vault has {{ $value }} active leases. This may indicate a credential leak or missing TTL on dynamic secrets."

        # Raft leader unavailable
        - alert: VaultRaftNoLeader
          expr: vault_raft_leader_lastContact_mean > 1000
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Vault Raft has no stable leader"
            description: "Vault Raft leader contact time is {{ $value }}ms — the cluster may be in an election or the leader is unreachable."

---
# Grafana dashboard — loaded automatically by Grafana sidecar
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"  # picked up by kube-prometheus-stack Grafana sidecar
data:
  vault-dashboard.json: |
    {
      "title": "Vault",
      "uid": "vault-overview",
      "tags": ["vault", "secrets"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "type": "stat",
          "title": "Unsealed Nodes",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{"expr": "sum(vault_core_unsealed)", "legendFormat": "Unsealed"}],
          "options": {"colorMode": "background"},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}}}
        },
        {
          "type": "stat",
          "title": "Active Leases",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "targets": [{"expr": "vault_expire_num_leases", "legendFormat": "Leases"}],
          "options": {"colorMode": "background"},
          "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 5000}, {"color": "red", "value": 10000}]}}}
        },
        {
          "type": "stat",
          "title": "Request Rate (req/s)",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "targets": [{"expr": "sum(rate(vault_core_handle_request_count[5m]))", "legendFormat": "req/s"}]
        },
        {
          "type": "stat",
          "title": "Error Rate",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "targets": [{"expr": "sum(rate(vault_core_handle_request_count{status=\"error\"}[5m])) / sum(rate(vault_core_handle_request_count[5m])) * 100", "legendFormat": "%"}],
          "options": {"colorMode": "background"},
          "fieldConfig": {"defaults": {"unit": "percent", "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}}
        },
        {
          "type": "timeseries",
          "title": "Request Rate by Type",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {"expr": "sum(rate(vault_core_handle_request_count[5m])) by (operation)", "legendFormat": "{{ operation }}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Active Leases Over Time",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {"expr": "vault_expire_num_leases", "legendFormat": "Leases"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Raft Leader Contact Latency (ms)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {"expr": "vault_raft_leader_lastContact_mean", "legendFormat": "{{ pod }}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Token Count",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {"expr": "vault_token_count", "legendFormat": "Total tokens"}
          ]
        }
      ]
    }
