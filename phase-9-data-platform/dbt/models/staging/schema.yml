version: 2

sources:
  - name: coverline_raw
    database: platform-eng-lab-will
    schema: coverline_raw
    tables:
      - name: raw_claims
      - name: raw_members

models:
  - name: stg_claims
    description: "Cleaned claims from PostgreSQL — approved/pending/rejected only, amount > 0"
    columns:
      - name: claim_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: member_id
        tests:
          - not_null
      - name: claim_amount
        description: "Claim amount in EUR — must be positive"
        tests:
          - not_null
      - name: claim_status
        tests:
          - not_null
          - accepted_values:
              values: ['approved', 'pending', 'rejected']

  - name: stg_members
    description: "Active CoverLine members with their monthly premium"
    columns:
      - name: member_id
        tests:
          - unique
          - not_null
      - name: premium_monthly
        description: "Monthly premium in EUR — must be positive"
        tests:
          - not_null
