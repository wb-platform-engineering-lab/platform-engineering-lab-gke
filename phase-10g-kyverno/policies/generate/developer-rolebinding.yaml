apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-developer-rolebinding
  annotations:
    policies.kyverno.io/title: Generate Developer RoleBinding
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      When a new namespace is created with label team set, automatically generate
      a RoleBinding that grants the corresponding team group view access to pods,
      logs, and configmaps in that namespace. Eliminates the manual RBAC step
      every time a team gets a new namespace.
spec:
  rules:
    - name: generate-developer-rolebinding
      match:
        any:
          - resources:
              kinds: [Namespace]
              selector:
                matchLabels:
                  team: "?*"
      generate:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: developer-view
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          metadata:
            labels:
              generated-by: kyverno
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: view
          subjects:
            - apiGroup: rbac.authorization.k8s.io
              kind: Group
              name: "{{ request.object.metadata.labels.team }}-developers"
